<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — TOP Pep</title>
<meta name="description" content="Question about an order, a COA, or reconstitution? Contact the TOP Pep support team.">
<link rel="icon" type="image/png" href="/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Sora:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css?v=16">
</head>
<body data-page="contact">
<a class="skip-link" href="#main">Skip to content</a>
<main id="main">

  <section class="wholesale-form-section" style="padding-top:56px;">
    <div class="wf-card">
      <div class="ds-eyebrow" data-i18n="f_support">Support</div>
      <h2 data-i18n="ct_h1">Contact us</h2>
      <p data-i18n="ct_lede">Question about an order, a COA, or reconstitution? Send us a message — we usually reply within a few hours on business days.</p>
      <form class="wf-form" id="contactForm" novalidate>
        <div class="wf-row">
          <input type="text" id="cfName" placeholder="Name" data-i18n-ph="ct_name" required aria-label="Name">
          <input type="email" id="cfEmail" placeholder="Email" data-i18n-ph="ph_email" required aria-label="Email">
        </div>
        <input type="text" id="cfOrder" placeholder="Order number (optional)" data-i18n-ph="ct_order" aria-label="Order number">
        <textarea id="cfMessage" rows="6" placeholder="Your message" data-i18n-ph="ct_msg" required aria-label="Message"></textarea>
        <button type="submit" class="wf-submit" data-i18n="ct_send">Send message</button>
        <div class="wf-status" id="cfStatus" role="status"></div>
      </form>
      <p style="margin-top:22px;font-size:14px;color:var(--muted);"><span data-i18n="ct_tg">Prefer chat? Message us on Telegram</span> — <a href="https://t.me/TOP_Pep" target="_blank" rel="noopener" style="color:var(--accent-primary);font-weight:600;">@TOP_Pep</a></p>
    </div>
  </section>

</main>
<script src="/data.js?v=16"></script>
<script src="/app.js?v=16"></script>
</body>
</html>
