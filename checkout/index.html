<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — TOP Pep</title>
<meta name="description" content="Secure demo checkout.">
<link rel="icon" type="image/png" href="/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Sora:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css?v=18">
</head>
<body data-page="checkout">
<a class="skip-link" href="#main">Skip to content</a>
<main id="main">
  <div class="wrap">
    <h1 style="padding-top:36px;" data-i18n="co_h1">Checkout</h1>
    <div class="checkout-layout">
      <form onsubmit="return false;">

        <div class="step">
          <div class="step-head"><span class="step-num">1</span><h2 data-i18n="contact_label">Contact</h2></div>
          <div class="field"><label for="coEmail" data-i18n="co_email">Email address</label><input id="coEmail" type="email" placeholder="you@lab.com" required></div>
          <label class="remember"><input type="checkbox"> <span data-i18n="co_news">Email me new lot &amp; COA releases</span></label>
        </div>

        <div class="step">
          <div class="step-head"><span class="step-num">2</span><h2 data-i18n="ship_addr">Shipping address</h2></div>
          <div class="field-row">
            <div class="field"><label for="coFirst" data-i18n="ph_first">First name</label><input id="coFirst" type="text"></div>
            <div class="field"><label for="coLast" data-i18n="ph_last">Last name</label><input id="coLast" type="text"></div>
          </div>
          <div class="field"><label for="coOrg" data-i18n="co_inst">Institution / lab (optional)</label><input id="coOrg" type="text"></div>
          <div class="field"><label for="coPhone" data-i18n="co_phone">Phone (optional)</label><input id="coPhone" type="tel" autocomplete="tel" placeholder="+49 …"></div>
          <div class="field-row">
            <div class="field field-street"><label for="coAddr" data-i18n="co_addr">Street</label><input id="coAddr" type="text" autocomplete="address-line1"></div>
            <div class="field field-house"><label for="coHouse" data-i18n="co_house">House no.</label><input id="coHouse" type="text" autocomplete="address-line2"></div>
          </div>
          <div class="field-row">
            <div class="field"><label for="coCity" data-i18n="co_city">City</label><input id="coCity" type="text" autocomplete="address-level2"></div>
            <div class="field"><label for="coZip" data-i18n="co_zip">Postal code</label><input id="coZip" type="text" autocomplete="postal-code"></div>
          </div>
          <div class="field"><label for="coCountry" data-i18n="co_country">Country</label>
            <select id="coCountry">
              <option data-country="Austria">Austria</option><option data-country="Belgium">Belgium</option><option data-country="Bulgaria">Bulgaria</option><option data-country="Croatia">Croatia</option><option data-country="Cyprus">Cyprus</option><option data-country="Czechia">Czechia</option><option data-country="Denmark">Denmark</option><option data-country="Estonia">Estonia</option><option data-country="Finland">Finland</option><option data-country="France">France</option><option data-country="Germany" selected>Germany</option><option data-country="Greece">Greece</option><option data-country="Hungary">Hungary</option><option data-country="Ireland">Ireland</option><option data-country="Italy">Italy</option><option data-country="Latvia">Latvia</option><option data-country="Lithuania">Lithuania</option><option data-country="Luxembourg">Luxembourg</option><option data-country="Malta">Malta</option><option data-country="Netherlands">Netherlands</option><option data-country="Poland">Poland</option><option data-country="Portugal">Portugal</option><option data-country="Romania">Romania</option><option data-country="Slovakia">Slovakia</option><option data-country="Slovenia">Slovenia</option><option data-country="Spain">Spain</option><option data-country="Sweden">Sweden</option><option data-country="United Kingdom">United Kingdom</option>
            </select>
          </div>
        </div>

        <div class="step">
          <div class="step-head"><span class="step-num">3</span><h2 data-i18n="shipping_method">Shipping method</h2></div>
          <label class="radio-card selected" data-group="ship"><input type="radio" name="ship" checked><div class="rc-body"><div class="rc-title" data-i18n="co_ship1">Tracked standard</div><div class="rc-sub" data-i18n="co_ship1s">All EU countries, 24–48h dispatch</div></div><span class="rc-price" data-i18n="co_ship1p">Free over €250</span></label>
          <label class="radio-card" data-group="ship"><input type="radio" name="ship"><div class="rc-body"><div class="rc-title" data-i18n="co_ship2">Express</div><div class="rc-sub" data-i18n="co_ship2s">Priority, insulated, 1–2 days</div></div><span class="rc-price">€18.00</span></label>
          <label class="radio-card" data-group="ship"><input type="radio" name="ship"><div class="rc-body"><div class="rc-title" data-i18n="co_ship3">United Kingdom</div><div class="rc-sub" data-i18n="co_ship3s">Tracked, 3–5 days</div></div><span class="rc-price">€29.00</span></label>
          <label class="radio-card insurance-card">
            <input type="checkbox" id="shipInsurance">
            <div class="rc-body"><div class="rc-title" data-i18n="ship_protect">Shipping protection</div><div class="rc-sub" data-i18n="ship_protect_sub">Covers loss, damage or a stuck parcel — we reship free of charge</div></div>
            <span class="rc-price" id="insPrice">4.99€</span>
          </label>
        </div>

        <div class="step">
          <div class="step-head"><span class="step-num">4</span><h2 data-i18n="co_addons">Add to your order</h2></div>
          <div class="upsell-grid">
            <div class="upsell"><div class="thumb"><img src="/Produktbilder/Bacteriostatic%20Water%2010mg.png" alt="Bacteriostatic Water"></div><div><div class="u-name" data-i18n="bac_water">Bacteriostatic Water 10 ml</div><div class="u-price">14.99€</div></div><button class="btn btn-sm btn-outline u-add" data-upsell="bacteriostatic-water"><span data-i18n="co_add">Add</span></button></div>
          </div>
        </div>

        <div class="step">
          <div class="step-head"><span class="step-num">5</span><h2 data-i18n="payment">Payment</h2></div>
          <div class="promo-block" id="promoBlock">
            <button type="button" class="promo-head" id="promoToggle" aria-expanded="false">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M20 12l-8 8-8-8V4h8z"/><circle cx="8.5" cy="8.5" r="1.2" fill="currentColor"/></svg>
              <span data-i18n="promo_code">Promo code</span>
              <svg class="promo-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M6 15l6-6 6 6"/></svg>
            </button>
            <div class="promo-body">
              <div class="promo-inline"><input type="text" placeholder="Enter code" data-i18n-ph="promo_enter" aria-label="Promo code"><button class="btn" data-i18n="apply">Apply</button></div>
            </div>
          </div>
          <!-- Card is the only payment method: the Stripe Payment Element is
               shown straight away, no accordion to click open. -->
          <div id="payment-element"><!-- Stripe Payment Element mounts here --></div>
          <div id="card-errors" class="pay-card-err" role="alert" aria-live="polite"></div>
        </div>

      </form>

      <aside class="order-summary" id="orderSummary"></aside>
    </div>
  </div>
</main>
<script src="https://js.stripe.com/v3/"></script>
<script src="/data.js?v=18"></script>
<script src="/app.js?v=18"></script>
</body>
</html>
