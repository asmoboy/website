<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Account — TOP Pep</title>
<meta name="description" content="Sign in or create a TOP Pep research account.">
<link rel="icon" type="image/png" href="/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Sora:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css?v=51">
</head>
<body data-page="account">
<a class="skip-link" href="#main">Skip to content</a>
<main id="main">
  <div class="auth-wrap">
    <div class="auth-card">
      <h1 id="authTitle" style="font-size:1.5rem;margin-bottom:22px;" data-i18n="acc_welcome">Welcome back</h1>
      <div class="auth-tabs" role="tablist">
        <button class="auth-tab" data-mode="login" role="tab" aria-selected="true" data-i18n="acc_signin">Sign in</button>
        <button class="auth-tab" data-mode="register" role="tab" aria-selected="false" data-i18n="acc_create">Create account</button>
      </div>

      <button class="oauth-btn" type="button" id="googleAuth">
        <svg aria-hidden="true" viewBox="0 0 24 24"><path fill="#4285F4" d="M21.6 12.23c0-.71-.06-1.4-.18-2.06H12v3.9h5.38a4.6 4.6 0 0 1-2 3.02v2.53h3.24c1.9-1.75 2.98-4.33 2.98-7.39Z"/><path fill="#34A853" d="M12 22c2.7 0 4.97-.9 6.62-2.38l-3.24-2.53c-.9.6-2.05.96-3.38.96-2.61 0-4.82-1.76-5.61-4.13H3.04v2.61A10 10 0 0 0 12 22Z"/><path fill="#FBBC05" d="M6.39 13.92A6.02 6.02 0 0 1 6.07 12c0-.67.12-1.31.32-1.92V7.47H3.04A10 10 0 0 0 2 12c0 1.61.39 3.14 1.04 4.53l3.35-2.61Z"/><path fill="#EA4335" d="M12 5.95c1.47 0 2.79.5 3.83 1.5l2.87-2.87A9.62 9.62 0 0 0 12 2a10 10 0 0 0-8.96 5.47l3.35 2.61C7.18 7.71 9.39 5.95 12 5.95Z"/></svg>
        <span data-i18n="acc_google">Continue with Google</span>
      </button>
      <div class="auth-divider" data-i18n="acc_or_email">or with email</div>

      <form id="authForm">
        <div class="field" id="nameField" style="display:none;"><label for="acName" data-i18n="acc_name">Full name</label><input id="acName" type="text" placeholder="Dr. A. Researcher"></div>
        <div class="field"><label for="acEmail" data-i18n="co_email">Email address</label><input id="acEmail" type="email" placeholder="you@lab.com" required></div>
        <div class="field"><label for="acPass" data-i18n="acc_pass">Password</label><input id="acPass" type="password" placeholder="••••••••" required></div>
        <div class="auth-row" id="authRow">
          <label class="remember"><input type="checkbox"> <span data-i18n="acc_remember">Remember me</span></label>
          <a class="auth-forgot" href="#" data-i18n="acc_forgot">Forgot password?</a>
        </div>
        <button class="btn btn-block" type="submit" id="authSubmit" data-i18n="acc_signin">Sign in</button>
        <p class="drawer-note" id="authStatus" style="margin-top:14px;min-height:16px;"></p>
      </form>
    </div>
  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/data.js?v=55"></script>
<script src="/app.js?v=56"></script>
</body>
</html>
